services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-world_cup_predictions}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  backend-1:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment: &backend-env
      NODE_ENV: production
      API_PREFIX: ${API_PREFIX:-api}
      BACKEND_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      FOOTBALL_DATA_API_URL: ${FOOTBALL_DATA_API_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:?FOOTBALL_DATA_API_KEY is required}
      FOOTBALL_DATA_ALLOW_INSECURE_TLS: ${FOOTBALL_DATA_ALLOW_INSECURE_TLS:-false}
      FOOTBALL_DATA_COMPETITION: ${FOOTBALL_DATA_COMPETITION:-WC}
      FOOTBALL_DATA_SYNC_INTERVAL_MINUTES: ${FOOTBALL_DATA_SYNC_INTERVAL_MINUTES:-5}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
      EMAIL_CODE_EXPIRES_MINUTES: ${EMAIL_CODE_EXPIRES_MINUTES:-15}
      RUN_PRISMA_MIGRATIONS: "true"
      BOOTSTRAP_ADMIN: "true"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  backend-2:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      <<: *backend-env
      RUN_PRISMA_MIGRATIONS: "false"
      BOOTSTRAP_ADMIN: "false"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  backend-3:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      <<: *backend-env
      RUN_PRISMA_MIGRATIONS: "false"
      BOOTSTRAP_ADMIN: "false"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  backend-4:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      <<: *backend-env
      RUN_PRISMA_MIGRATIONS: "false"
      BOOTSTRAP_ADMIN: "false"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  backend-5:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      <<: *backend-env
      RUN_PRISMA_MIGRATIONS: "false"
      BOOTSTRAP_ADMIN: "false"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  frontend-1:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment: &frontend-env
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  frontend-2:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      <<: *frontend-env
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  frontend-3:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      <<: *frontend-env
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  frontend-4:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      <<: *frontend-env
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  frontend-5:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      <<: *frontend-env
    restart: unless-stopped
    depends_on:
      backend-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.aws.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend-1:
        condition: service_healthy
      frontend-2:
        condition: service_healthy
      frontend-3:
        condition: service_healthy
      frontend-4:
        condition: service_healthy
      frontend-5:
        condition: service_healthy
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
      backend-4:
        condition: service_healthy
      backend-5:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
